name: Upgrade uv.lock

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  upgrade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Upgrade lockfile
        run: uv lock --upgrade

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: upgrade uv.lock"
          title: "chore: upgrade uv.lock"
          body: "Automated daily dependency upgrade via `uv lock --upgrade`."
          branch: chore/upgrade-uv-lock
          add-paths: uv.lock
          delete-branch: true
